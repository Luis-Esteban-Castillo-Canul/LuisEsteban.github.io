<style>
    body {
        background: #222;
        color: white;
        text-align: center;
    }

    img {
        animation: girar 2s linear infinite;
    }

    @keyframes girar {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
</style>

<script>
function toggleAudio() {
    var audio = document.getElementById("miAudio");

    if (audio.paused) {
        audio.play();
    } else {
        audio.pause();
    }
}
</script>

     width="450"

     style="cursor:pointer;">
